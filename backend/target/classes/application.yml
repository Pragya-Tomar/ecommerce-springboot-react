spring:
  application:
    name: ecommerce-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:beta}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

# app.jwt.secret and datasource creds are NOT defined here — each profile
# (beta/prod/gamma) sets its own values below, so switching profiles switches
# your whole credential set at once instead of editing one shared file.
app:
  jwt:
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h default, same across all profiles
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

logging:
  level:
    root: INFO
    com.ecommerce.app: DEBUG