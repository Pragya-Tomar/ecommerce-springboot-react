spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_beta}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:beta_demo_pw_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.ecommerce.app: DEBUG
    org.springframework.security: DEBUG

app:
  error:
    include-stacktrace: true
  jwt:
    secret: ${JWT_SECRET:beta-demo-jwt-secret-key-not-for-real-use-2026}