spring:
  datasource:
    # Own demo credentials, deliberately different from beta's. In a real
    # deployment these ${DB_...} placeholders would resolve from real env
    # vars/secrets — here they fall back to obviously-fake demo values so the
    # project runs standalone without extra setup.
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_prod}
    username: ${DB_USERNAME:prod_user}
    password: ${DB_PASSWORD:prod_demo_pw_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: false
    hibernate:
      # Never let prod auto-alter your schema — use migrations instead
      ddl-auto: validate

logging:
  level:
    com.ecommerce.app: WARN
    org.springframework.security: WARN

app:
  error:
    include-stacktrace: false
  jwt:
    # Separate signing key from beta/gamma — a prod-signed token is the only
    # one that should ever pass validation against prod.
    secret: ${JWT_SECRET:prod-demo-jwt-secret-key-not-for-real-use-2026}